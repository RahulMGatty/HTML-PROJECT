
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Simple Page</title>
	<style>
		body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 2rem; }
		header { margin-bottom: 1rem; }
		main { max-width: 720px; }
	</style>
</head>
<body>
	<header>
		<h1>Welcome to the Simple Page</h1>
		<p>A minimal example using basic HTML.</p>
	</header>

	<main>
		<section>
			<h2>Features</h2>
			<ul>
				<li>Clean structure (header, main, footer)</li>
				<li>Responsive viewport meta tag</li>
				<li>Light inline styling</li>
			</ul>
		</section>

		<section>
			<h2>Example Button</h2>
			<button onclick="alert('Hello from the simple page!')">Click me</button>
		</section>
	</main>

	<footer style="margin-top:2rem; color:#555;">
		<small>Created with basic HTML.</small>
	</footer>
</body>
</html>
